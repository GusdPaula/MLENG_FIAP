model:
  type: ncf  # one of: ncf, gmf, matrix_factorization
  seed: 42
  batch_size: 256
  learning_rate: 0.001
  epochs: 10
  show_progress: true
  num_negatives: 4
  min_interactions: 5
  raw_events_path: data/raw/events.csv
  artifact_dir: models

  # Data-processing strategy (Strategy pattern).
  # one of: weighted, binary, implicit
  processor: weighted
  processor_kwargs: {}

  # Memory-efficient batch processing.
  # When true, negatives are sampled lazily per positive (streaming mode),
  # keeping the in-memory sample table bounded. The trainer still iterates
  # the DataLoader in fixed-size batches.
  streaming: false

  # Early stopping.
  # Disabled by default - set enabled: true to stop training once the
  # monitored metric stops improving for `patience` consecutive epochs.
  # `monitor` can be "val_loss" or any metric returned by Trainer.evaluate
  # (e.g. "auc_roc", "avg_precision", "ndcg_at_k"). `mode` is "min" for loss and
  # "max" for higher-is-better metrics.
  # Note: "ndcg_at_k" uses sampling for efficiency during training.
  early_stopping:
    enabled: true
    monitor: ndcg_at_k
    mode: max
    patience: 3
    min_delta: 0.0

  # Model-specific hyperparameters (forwarded to the model factory).
  hyperparams:
    embedding_dim: 64
    hidden_layers: [128, 64, 32]
    dropout: 0.2
