repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: bash -lc 'cd fase_2 && poetry run ruff check ecommerce_recommender ecommerce_recommender/tests'
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest-unit
        name: pytest-unit
        entry: bash -lc 'cd fase_2 && poetry run pytest ecommerce_recommender/tests/unit -v'
        language: system
        pass_filenames: false
        always_run: true
