repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff
        name: phase2-ruff
        entry: bash -lc 'cd fase_2 && poetry run python -m ruff check --config=ruff.toml ecommerce-recommender ecommerce-recommender/tests'
        language: system
        pass_filenames: false
        always_run: true
      - id: pytest
        name: phase2-pytest
        entry: bash -lc 'cd fase_2 && poetry run pytest ecommerce-recommender/tests/unit'
        language: system
        pass_filenames: false
        always_run: true
