repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.284
    hooks:
      - id: ruff
        args: ["check", "--config=fase_2/ruff.toml", "fase_2/ecommerce_recommender", "fase_2/ecommerce_recommender/tests"]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -lc 'cd fase_2 && poetry run pytest ecommerce_recommender/tests/unit'
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit, push]
