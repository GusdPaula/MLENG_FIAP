repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: ["--config=fase_2/ruff.toml"]
        exclude: ^(fase_1/|fase_2/scripts/|fase_2/ecommerce_recommender/notebooks/)

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: bash -lc 'cd fase_2/ecommerce_recommender && PYTHONPATH=src poetry run pytest tests/unit -v'
        language: system
        pass_filenames: false
        always_run: true
