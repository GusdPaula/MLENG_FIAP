name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Linting and Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          # Automatically caches dependencies to speed up future runs
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Project Dependencies
        # Installs both app and dev dependencies (ruff, pytest, etc.)
        run: uv sync --all-extras --dev

      - name: Lint and Format Check (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Pytest
        env:
          # Map your GitHub Secrets to Environment Variables
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_TABLE_ID: ${{ secrets.BQ_TABLE_ID }}
        run: |
          # 1. Create the secrets directory in the virtual runner
          mkdir -p secrets
          
          # 2. Recreate the physical JSON file from the secret content
          echo "$GCP_KEY_JSON" > secrets/your-key.json
          
          # 3. Point the Google Auth library to that file
          export GOOGLE_APPLICATION_CREDENTIALS="secrets/your-key.json"
          
          # 4. Execute tests
          uv run pytest