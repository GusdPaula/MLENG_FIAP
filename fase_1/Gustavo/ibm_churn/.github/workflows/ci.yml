jobs:
  test:
    name: Run Linting and Tests
    runs-on: ubuntu-latest
    # --- ADD THIS LINE ---
    defaults:
      run:
        working-directory: ./ibm_churn  # Change this to your actual subfolder name
    # ---------------------

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Project Dependencies
        # uv will now look inside ./ibm_churn for the pyproject.toml
        run: uv sync --all-extras --dev

      - name: Lint and Format Check (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Pytest
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
        run: |
          mkdir -p secrets
          echo "$GCP_KEY_JSON" > secrets/your-key.json
          export GOOGLE_APPLICATION_CREDENTIALS="secrets/your-key.json"
          uv run pytest