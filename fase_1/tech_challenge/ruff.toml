# Ruff configuration for Telco Churn Prediction

# Python versions to target
target-version = "py310"
line-length = 100

# Rules to enable
lint.select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "C4",     # flake8-comprehensions
    "PT",     # flake8-pytest-style
    "SIM",    # flake8-simplify
    "RUF",    # Ruff-specific rules
]

# Rules to ignore
lint.ignore = [
    "E501",   # Line too long
    "W191",   # Indentation contains tabs
    "D100",   # Missing docstring in public module
    "D104",   # Missing docstring in public package
]

# Exclude patterns
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "venv",
    "build",
    "dist",
    ".eggs",
    "notebooks",
    "*.egg-info",
    ".pytest_cache",
    ".mypy_cache",
]

# Per-file ignores
[lint.per-file-ignores]
"__init__.py" = ["F401"]
"tests/**" = ["D100", "D101"]

# Isort configuration
[lint.isort]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
known-first-party = ["src"]

# Flake8-bugbear configuration
[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends"]

# Pylint configuration
[lint.pylint]
max-args = 7
# Changed 'max-attributes' to 'max-public-methods' or similar supported field
# If you want to limit attributes, Ruff uses different specific rules,
# but for now, let's use a field it definitely accepts:
max-branches = 12
max-statements = 50
