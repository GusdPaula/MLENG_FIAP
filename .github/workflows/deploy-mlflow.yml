name: Deploy MLflow Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'fase_2/infra/mlflow/**'
  pull_request:
    branches:
      - main
    paths:
      - 'fase_2/infra/mlflow/**'
  workflow_dispatch:
    inputs:
      use_custom_domain:
        description: 'Activate custom domain (Only works AFTER validating the ACM cert in your DNS)'
        type: boolean
        required: true
        default: false


jobs:
  terraform:
    name: Terraform Deploy MLflow
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/mlflow-server:${{ github.sha }} -t ${{ secrets.DOCKERHUB_USERNAME }}/mlflow-server:latest -f fase_2/Dockerfile.mlflow fase_2
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlflow-server:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mlflow-server:latest

      - name: Terraform Format check
        run: |
          cd fase_2/infra/mlflow
          terraform fmt -check

      - name: Terraform Init
        run: |
          cd fase_2/infra/mlflow
          terraform init

      - name: Terraform Plan
        run: |
          cd fase_2/infra/mlflow
          terraform plan -input=false -var="dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" -var="docker_image_tag=${{ github.sha }}" -var="use_custom_domain=${{ github.event.inputs.use_custom_domain || 'false' }}"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          cd fase_2/infra/mlflow
          terraform apply -auto-approve -input=false -var="dockerhub_username=${{ secrets.DOCKERHUB_USERNAME }}" -var="docker_image_tag=${{ github.sha }}" -var="use_custom_domain=${{ github.event.inputs.use_custom_domain || 'false' }}"



