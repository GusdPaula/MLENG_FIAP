name: CI

on:
  push:
    branches: [ main, gustavo ] # Added gustavo branch here so it triggers on push
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Linting and Tests
    runs-on: ubuntu-latest
    
    # This tells GitHub to run all commands inside your subfolder
    defaults:
      run:
        working-directory: fase_1/Gustavo/ibm_churn

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install Project Dependencies
        # uv will now find the pyproject.toml in the working-directory
        run: uv sync --all-extras --dev

      - name: Lint and Format Check (Ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run Pytest
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_KEY_JSON: ${{ secrets.GCP_SA_KEY }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_TABLE_ID: ${{ secrets.BQ_TABLE_ID }}
        run: |
          # These steps now happen inside fase_1/Gustavo/ibm_churn/
          mkdir -p secrets
          echo "$GCP_KEY_JSON" > secrets/your-key.json
          
          # Use a relative path for credentials
          export GOOGLE_APPLICATION_CREDENTIALS="secrets/your-key.json"
          
          uv run pytest