name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  fase1_test:
    name: Fase 1 Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          uv sync --project fase_1/tech_challenge

      - name: Run ruff (Lint & PEP8)
        run: |
          uv run --project fase_1/tech_challenge ruff check .
          uv run --project fase_1/tech_challenge ruff format --check .

      - name: Run pytest
        working-directory: ./fase_1/tech_challenge
        run: |
          uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  data_pipeline_test:
    name: Fase 2 Data Pipeline Lint/Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies for fase_2
        run: |
          cd fase_2
          poetry install --no-interaction --no-root

      - name: Run ruff
        run: |
          cd fase_2
          poetry run ruff check ecommerce-recommender ecommerce-recommender/tests --config ruff.toml

      - name: Run pytest
        run: |
          cd fase_2
          poetry run pytest ecommerce-recommender/tests/unit

  smoke-test-aws:
    name: AWS Endpoint Smoke Test (Newman)
    runs-on: ubuntu-latest
    needs: fase1_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Newman
        run: |
          npm install -g newman

      - name: Run AWS Smoke Test via Newman
        working-directory: ./fase_1/tech_challenge
        run: |
          newman run tests/smoke_test/MLTelco_AWS.postman_collection \
            --reporters cli,json \
            --reporter-json-export /tmp/newman-results.json

      - name: Upload Newman Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-aws-smoke-test
          path: /tmp/newman-results.json
