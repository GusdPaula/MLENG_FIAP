name: Fase 2 CI

on:
  push:
    paths:
      - 'fase_2/**'
  pull_request:
    paths:
      - 'fase_2/**'
  workflow_dispatch: {}

jobs:
  fase2_test:
    name: Fase 2 Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies for fase_2
        run: |
          cd fase_2
          poetry install --no-interaction --no-root

      - name: Run ruff
        run: |
          cd fase_2
          poetry run python -m ruff check --config ruff.toml ecommerce_recommender ecommerce_recommender/tests

      - name: Run pytest
        run: |
          cd fase_2
          poetry run pytest ecommerce_recommender/tests/unit
