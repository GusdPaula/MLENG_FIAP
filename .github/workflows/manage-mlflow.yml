name: Manage MLflow Server

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'start'
        type: choice
        options:
        - start
        - stop

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Stop MLflow
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          echo "Stopping EC2 instance..."
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=mlflow-fiap-server" --query "Reservations[0].Instances[0].InstanceId" --output text 2>/dev/null || echo "None")
          if [ "$INSTANCE_ID" != "None" ] && [ -n "$INSTANCE_ID" ]; then
            INSTANCE_STATE=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --query "Reservations[0].Instances[0].State.Name" --output text 2>/dev/null || echo "unknown")
            if [ "$INSTANCE_STATE" = "running" ] || [ "$INSTANCE_STATE" = "pending" ]; then
              echo "EC2 is $INSTANCE_STATE. Stopping..."
              aws ec2 stop-instances --instance-ids $INSTANCE_ID
            else
              echo "EC2 is not running (State: $INSTANCE_STATE). Skipping stop."
            fi
          else
            echo "No EC2 instance found."
          fi

          echo "Stopping RDS instance..."
          DB_STATUS=$(aws rds describe-db-instances --db-instance-identifier mlflow-fiap-db --query "DBInstances[0].DBInstanceStatus" --output text 2>/dev/null || echo "None")
          if [ "$DB_STATUS" = "available" ]; then
            echo "RDS is available. Stopping..."
            aws rds stop-db-instance --db-instance-identifier mlflow-fiap-db
          else
            echo "RDS is in status: $DB_STATUS. Skipping stop."
          fi

      - name: Start MLflow
        if: ${{ github.event.inputs.action == 'start' }}
        run: |
          echo "Checking RDS instance..."
          DB_STATUS=$(aws rds describe-db-instances --db-instance-identifier mlflow-fiap-db --query "DBInstances[0].DBInstanceStatus" --output text 2>/dev/null || echo "None")
          echo "RDS status is: $DB_STATUS"

          if [ "$DB_STATUS" = "stopping" ]; then
            echo "RDS is currently stopping. Waiting for it to stop..."
            aws rds wait db-instance-stopped --db-instance-identifier mlflow-fiap-db
            DB_STATUS="stopped"
          fi

          if [ "$DB_STATUS" = "stopped" ]; then
            echo "RDS is stopped. Starting..."
            aws rds start-db-instance --db-instance-identifier mlflow-fiap-db
            echo "Waiting for RDS to be available..."
            aws rds wait db-instance-available --db-instance-identifier mlflow-fiap-db
          elif [ "$DB_STATUS" = "starting" ]; then
            echo "RDS is starting. Waiting for it to be available..."
            aws rds wait db-instance-available --db-instance-identifier mlflow-fiap-db
          elif [ "$DB_STATUS" = "available" ]; then
            echo "RDS is already available."
          else
            echo "RDS status is: $DB_STATUS. Attempting to start and wait..."
            aws rds start-db-instance --db-instance-identifier mlflow-fiap-db || echo "Could not start RDS database."
            echo "Waiting for RDS to be available..."
            aws rds wait db-instance-available --db-instance-identifier mlflow-fiap-db || echo "Wait failed, proceeding anyway."
          fi

          echo "RDS is fully available. Proceeding to EC2..."
          echo "Checking EC2 instance..."
          INSTANCE_ID=$(aws ec2 describe-instances --filters "Name=tag:Name,Values=mlflow-fiap-server" --query "Reservations[0].Instances[0].InstanceId" --output text 2>/dev/null || echo "None")
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "Error: No EC2 instance found with tag Name=mlflow-fiap-server"
            exit 1
          fi

          INSTANCE_STATE=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --query "Reservations[0].Instances[0].State.Name" --output text 2>/dev/null || echo "unknown")
          if [ "$INSTANCE_STATE" = "stopped" ]; then
            echo "EC2 is stopped. Starting..."
            aws ec2 start-instances --instance-ids $INSTANCE_ID
          elif [ "$INSTANCE_STATE" = "running" ] || [ "$INSTANCE_STATE" = "pending" ]; then
            echo "EC2 is already $INSTANCE_STATE."
          else
            echo "EC2 state is: $INSTANCE_STATE. Attempting to start anyway..."
            aws ec2 start-instances --instance-ids $INSTANCE_ID || echo "Could not start EC2 instance."
          fi

          echo "Waiting for EC2 to be running..."
          aws ec2 wait instance-running --instance-ids $INSTANCE_ID
          # Wait up to 60 seconds for PublicDnsName to be available and not empty/None
          echo "Retrieving Public DNS Name..."
          for i in {1..12}; do
            NEW_IP=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --query "Reservations[0].Instances[0].PublicDnsName" --output text)
            if [ -n "$NEW_IP" ] && [ "$NEW_IP" != "None" ] && [ "$NEW_IP" != "" ]; then
              break
            fi
            echo "Waiting for Public DNS Name to be generated..."
            sleep 5
          done

          if [ -z "$NEW_IP" ] || [ "$NEW_IP" == "None" ] || [ "$NEW_IP" == "" ]; then
            echo "Warning: Public DNS Name not found. Falling back to Public IP..."
            NEW_IP=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID --query "Reservations[0].Instances[0].PublicIpAddress" --output text)
          fi
          echo "New EC2 DNS/IP: $NEW_IP"

          echo "Updating CloudFront Distribution Origin..."
          # Find CloudFront Distribution ID
          # 1. Try finding by comment
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Comment=='MLflow Distribution for mlflow-fiap'].Id" --output text 2>/dev/null || echo "")

          # 2. If not found or empty, fallback to tag search with correct ARN format (no region)
          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ] || [ "$DIST_ID" = "" ]; then
            echo "Searching distribution by tag Name=mlflow-fiap-cf..."
            ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
            DISTRIBUTIONS=$(aws cloudfront list-distributions --query "DistributionList.Items[*].Id" --output text || echo "")
            DIST_ID=""
            for ID in $DISTRIBUTIONS; do
              TAGS=$(aws cloudfront list-tags-for-resource --resource arn:aws:cloudfront::$ACCOUNT_ID:distribution/$ID --query "Tags.Items" --output json 2>/dev/null || echo "[]")
              HAS_TAG=$(echo $TAGS | jq 'map(select(.Key=="Name" and .Value=="mlflow-fiap-cf")) | length')
              if [ "$HAS_TAG" -gt "0" ]; then
                DIST_ID=$ID
                break
              fi
            done
          fi

          if [ -n "$DIST_ID" ] && [ "$DIST_ID" != "None" ] && [ "$DIST_ID" != "" ]; then
            echo "Found Distribution ID: $DIST_ID"
            ETAG=$(aws cloudfront get-distribution-config --id $DIST_ID --query 'ETag' --output text)
            aws cloudfront get-distribution-config --id $DIST_ID --query 'DistributionConfig' --output json > config.json

            CURRENT_ORIGIN_DOMAIN=$(jq -r '.Origins.Items[0].DomainName' config.json)
            echo "Current CloudFront Origin Domain: $CURRENT_ORIGIN_DOMAIN"
            echo "New EC2 DNS/IP: $NEW_IP"

            if [ "$CURRENT_ORIGIN_DOMAIN" = "$NEW_IP" ]; then
              echo "CloudFront Origin is already pointing to the current EC2 DNS. No update needed!"
            else
              echo "CloudFront Origin needs update. Updating..."
              jq --arg new_domain "$NEW_IP" '.Origins.Items[0].DomainName = $new_domain' config.json > new-config.json
              aws cloudfront update-distribution --id $DIST_ID --if-match $ETAG --distribution-config file://new-config.json > /dev/null

              echo "Waiting for CloudFront deployment to finish (this may take up to 10 minutes)..."
              aws cloudfront wait distribution-deployed --id $DIST_ID
              echo "CloudFront update completed."
            fi

            DOMAIN=$(aws cloudfront get-distribution --id $DIST_ID --query 'Distribution.DomainName' --output text)
            echo "=========================================="
            echo "MLflow is accessible at: https://$DOMAIN"
            echo "=========================================="
          else
            echo "Could not find CloudFront distribution with comment 'MLflow Distribution for mlflow-fiap' or tag Name=mlflow-fiap-cf"
            echo "To access MLflow directly, go to: http://$NEW_IP:5000"
          fi
