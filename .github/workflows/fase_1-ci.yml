name: Fase 1 CI

on:
  push:
    paths:
      - 'fase_1/**'
  pull_request:
    paths:
      - 'fase_1/**'

jobs:
  fase1_test:
    name: Fase 1 Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Dependencies
        run: |
          uv sync --project fase_1/tech_challenge

      - name: Run ruff (Lint & PEP8)
        working-directory: ./fase_1/tech_challenge
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run pytest
        working-directory: ./fase_1/tech_challenge
        run: |
          uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=80
